name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-smoke:
    name: Build + CLI smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Unit tests (projects + ai-config)
        run: npm test

      - name: TypeScript build
        run: npm run build

      - name: Verify dist output exists
        run: |
          test -f dist/cli.js || { echo "❌ dist/cli.js missing after build"; exit 1; }
          echo "✓ dist/cli.js present"

      - name: Link globally as `nostr-station`
        run: npm link

      - name: --version matches package.json
        run: |
          out=$(nostr-station --version)
          echo "$out"
          expected="nostr-station $(node -p "require('./package.json').version")"
          [[ "$out" == "$expected" ]] || { echo "❌ got '$out', expected '$expected'"; exit 1; }

      - name: Help text lists every command
        run: |
          output=$(nostr-station help)
          echo "$output"
          # Match help output post-rename:
          #   logs → folded into `relay logs`
          #   push → publish
          #   setup-editor → editor
          # See commit ebeae84 for the rename.
          for cmd in onboard doctor status update chat relay tui seed publish keychain nsite editor completion uninstall; do
            echo "$output" | grep -qw "$cmd" || { echo "❌ Missing from help: $cmd"; exit 1; }
          done
          echo "✓ All commands listed in help"

      - name: Unknown command falls through to help
        run: |
          nostr-station nonexistent-command 2>&1 | grep -q "USAGE" || {
            echo "❌ unknown command did not fall through to help"; exit 1;
          }

      - name: status --json emits valid JSON (schema-only check)
        run: |
          # Capture stdout only — nothing else should leak here now that
          # cli.tsx short-circuits --json before mounting Ink.
          nostr-station status --json > /tmp/status.json
          echo "--- raw output ---"
          cat /tmp/status.json
          echo "--- schema check ---"
          python3 <<'PY'
          import json, sys
          with open('/tmp/status.json') as f:
              d = json.load(f)

          # Schema contract — every status row MUST be present as a key,
          # regardless of whether the underlying service is installed/running.
          # In CI nothing is installed, so ok=False is expected and acceptable.
          # This test ONLY validates structure, not values.
          required = {'Relay', 'nostr-vpn', 'ngit', 'claude-code', 'nak', 'relay bin'}
          missing = required - set(d.keys())
          if missing:
              print(f'FAIL: missing keys: {missing}')
              sys.exit(1)

          # Every row must have {ok: bool, value: str}
          for k, v in d.items():
              if not isinstance(v, dict):
                  print(f'FAIL: {k} is not an object')
                  sys.exit(1)
              if 'ok' not in v or not isinstance(v['ok'], bool):
                  print(f'FAIL: {k}.ok missing or not a bool')
                  sys.exit(1)
              if 'value' not in v or not isinstance(v['value'], str):
                  print(f'FAIL: {k}.value missing or not a string')
                  sys.exit(1)

          ok_count = sum(1 for v in d.values() if v['ok'])
          print(f'OK: all {len(d)} keys present, all rows well-formed')
          print(f'info: {ok_count}/{len(d)} services healthy (not asserted in CI)')
          PY

      - name: Banner tier detection present
        run: |
          # Banner uses a three-tier capability detector — plain / safe / full —
          # so unknown terminals fall back to plain-text rather than rendering
          # double-width box-drawing chars. Guard all three tiers + the
          # NOSTR_STATION_BANNER escape hatch so a future refactor can't
          # silently revert to an unconditional full banner.
          f=src/onboard/components/Banner.tsx
          for token in 'detectTier' "'plain'" "'safe'" "'full'" 'NOSTR_STATION_BANNER'; do
            grep -q "$token" "$f" || { echo "❌ Banner tier check missing: $token"; exit 1; }
          done
          echo "✓ Banner tier detection wired (plain/safe/full + env override)"

      - name: Select double-arrow fix present
        run: |
          grep -q "indicatorComponent" src/onboard/components/Select.tsx \
            || { echo "❌ Select indicator override missing"; exit 1; }
          echo "✓ Select indicator override wired"

      - name: Version pinning constants present
        run: |
          grep -q "nostr-rs-relay" src/lib/versions.ts
          grep -q "ngit" src/lib/versions.ts
          echo "✓ pinned versions declared"

  shellcheck:
    name: install.sh lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get update -qq && sudo apt-get install -y shellcheck

      - name: bash syntax check
        run: bash -n install.sh

      - name: ShellCheck
        run: shellcheck install.sh
