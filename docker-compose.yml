# nostr-station — end-user docker-compose stack.
#
# Quick start:
#   git clone <this-repo> && cd nostr-station
#   docker compose up
#
# This brings up three containers on a private bridge network:
#   - relay     nostr-rs-relay 0.8.12, internal-Docker-only (no host port)
#   - station   the dashboard, bound to 127.0.0.1:3000 on the host
#   - watchdog  long-running heartbeat + relay-health probe
#
# Trust model: the station's host port is bound to 127.0.0.1:3000:3000,
# so only the host machine itself can reach the dashboard. Inside the
# container the auth-localhost-exemption trusts any source IP because
# the trust gate has already been enforced at the host port binding.
# See src/lib/auth.ts for the STATION_MODE=container branch.
#
# Persistence: five named volumes survive `docker compose down` (config,
# keys, relay db, watchdog heartbeat, projects). Use `docker compose down -v`
# for a clean reset back to first-run state.
#
# Projects volume: the dashboard scaffolds new projects into /root/projects
# inside the station container; that path is the named `projects` volume,
# so the working trees survive container rebuilds. STATION_PROJECTS_ROOT
# tells validateProjectPath (src/lib/projects.ts) to gate paths against
# this root instead of HOME.

services:
  relay:
    build:
      context: .
      dockerfile: Dockerfile.relay
    # Tee stdout to a file in the shared `station-logs` volume so the
    # dashboard's Logs panel can `tail -f` it. Docker's own log driver
    # still receives stdout (the `tee` doesn't swallow it), so
    # `docker compose logs relay` keeps working as the source of truth.
    command: ["sh", "-c", "nostr-rs-relay --config /etc/nostr-rs-relay/config.toml 2>&1 | tee -a /var/log/nostr-station/relay.log"]
    volumes:
      - "relay-data:/var/lib/nostr-rs-relay"
      - "station-logs:/var/log/nostr-station"
    networks: [ nostr-net ]
    restart: unless-stopped
    # No `ports:` — relay is internal-Docker-only.

  station:
    build:
      context: .
      dockerfile: Dockerfile.station
    command: ["node", "dist/cli.js", "serve"]
    environment:
      STATION_MODE: container
      DEV_HOST: 0.0.0.0
      RELAY_HOST: relay
      RELAY_PORT: "8080"
      WATCHDOG_HEARTBEAT: /var/run/nostr-station/watchdog.heartbeat
      KEYCHAIN_DIR: /var/lib/nostr-station/keys
      STATION_PROJECTS_ROOT: /root/projects
      STATION_LOG_DIR: /var/log/nostr-station
    volumes:
      - "station-config:/root/.nostr-station"
      - "keys:/var/lib/nostr-station/keys"
      - "watchdog-heartbeat:/var/run/nostr-station"
      - "projects:/root/projects"
      # Read-only — the dashboard tails relay/watchdog logs but never
      # writes to them. Both writers (relay + watchdog containers) mount
      # the same volume read-write.
      - "station-logs:/var/log/nostr-station:ro"
    ports:
      - "127.0.0.1:3000:3000"
    networks: [ nostr-net ]
    depends_on: [ relay ]
    restart: unless-stopped

  watchdog:
    build:
      context: .
      dockerfile: Dockerfile.station
    # Same tee pattern as relay — stdout still goes to docker logs, plus
    # a copy into the shared volume the dashboard tails.
    command: ["sh", "-c", "node dist/cli.js watchdog --loop --interval 60 2>&1 | tee -a /var/log/nostr-station/watchdog.log"]
    environment:
      STATION_MODE: container
      RELAY_HOST: relay
      RELAY_PORT: "8080"
      WATCHDOG_HEARTBEAT: /var/run/nostr-station/watchdog.heartbeat
      KEYCHAIN_DIR: /var/lib/nostr-station/keys
    volumes:
      - "keys:/var/lib/nostr-station/keys"
      - "watchdog-heartbeat:/var/run/nostr-station"
      - "station-logs:/var/log/nostr-station"
    networks: [ nostr-net ]
    depends_on: [ relay ]
    restart: unless-stopped

volumes:
  relay-data:
  station-config:
  keys:
  watchdog-heartbeat:
  projects:           # working trees scaffolded by the dashboard
  station-logs:       # relay + watchdog stdout, tailed by the dashboard

networks:
  nostr-net:
